name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Instala pnpm primero (para que el cache de setup-node no falle)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      # 2) Ahora sí, setup node + cache pnpm
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Build
        working-directory: web
        run: pnpm build
